name: Shelly Dashboard
version: "1.6.0"
slug: shelly_dashboard
description: Lokalny dashboard do monitorowania Shelly i firmware
url: "https://github.com/PabloKudlaty/home-assistant-shelly-dashboard-addon"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
host_network: true

ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: Web UI Shelly Dashboard (bezpośredni dostęp)

# Home Assistant Ingress — panel w bocznym pasku HA
ingress: true
ingress_port: 5000
ingress_stream: false
panel_icon: mdi:power-plug
panel_title: Shelly Dashboard
panel_admin: false

options:
  devices: ""
  network: ""
  refresh: 15
  timeout: 3
  mdns_timeout: 5
  user: ""
  password: ""
  use_mdns: true

schema:
  devices: str?
  network: str?
  refresh: int(1,3600)
  timeout: int(1,60)
  mdns_timeout: int(1,60)
  user: str?
  password: password?
  use_mdns: bool
